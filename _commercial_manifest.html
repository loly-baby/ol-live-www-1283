<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        background: #0b0f19;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .box {
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 24px;
        text-align: center;
        background: rgba(255, 255, 255, 0.02);
        max-width: 520px;
      }
      .ok {
        margin-top: 24px;
        background: rgba(34, 197, 94, 0.1);
        color: #4ade80;
        padding: 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: bold;
      }
      .emergency {
        margin-top: 24px; /* Give some space from the element above */
        background: rgba(239, 68, 68, 0.1); /* Red background */
        color: #f87171; /* Lighter red text */
        padding: 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1 style="font-size: 24px; margin-bottom: 10px;">应用架构扫描完毕</h1>
      <p style="color: #60a5fa; font-size: 12px; letter-spacing: 2px; margin-bottom: 30px;">
        Application Architecture Ready
      </p>
      <div class="ok">校验通过：准备进入物理云端交付</div>
      <div class="emergency">
        应急处理：检测到异常，请人工介入
      </div>
    </div>
  </body>
</html>
